<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding-top: 80px;
    color: #333;
  }

  .app {
    width: 520px;
    max-width: 95vw;
  }

  h1 {
    text-align: center;
    font-size: 64px;
    font-weight: 200;
    color: #e8d5b7;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  .input-row {
    display: flex;
    gap: 0;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  .input-row input {
    flex: 1;
    border: none;
    outline: none;
    padding: 16px 20px;
    font-size: 18px;
    color: #333;
  }

  .input-row input::placeholder { color: #ccc; }

  .input-row button {
    border: none;
    background: #4a90d9;
    color: #fff;
    padding: 16px 24px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .input-row button:hover { background: #357abd; }

  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }

  .filters {
    display: flex;
    gap: 4px;
  }

  .filters button {
    border: 1px solid transparent;
    background: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    color: #666;
    transition: all 0.15s;
  }

  .filters button:hover { border-color: #e8d5b7; }

  .filters button.active {
    border-color: #e8d5b7;
    color: #333;
  }

  .clear-btn {
    border: none;
    background: none;
    color: #999;
    cursor: pointer;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .clear-btn:hover { color: #e06060; }

  .count { color: #888; }

  .list { list-style: none; }

  .list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid #f5f5f5;
    transition: background 0.15s;
  }

  .list li:hover { background: #fafafa; }

  .list li:last-child { border-bottom: none; }

  .list li input[type="checkbox"] {
    appearance: none;
    width: 22px;
    height: 22px;
    border: 2px solid #d5d5d5;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative;
  }

  .list li input[type="checkbox"]:checked {
    border-color: #5cb85c;
    background: #5cb85c;
  }

  .list li input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 13px;
  }

  .list li .text {
    flex: 1;
    font-size: 16px;
    word-break: break-word;
  }

  .list li.completed .text {
    text-decoration: line-through;
    color: #bbb;
  }

  .list li .edit-input {
    flex: 1;
    border: 1px solid #4a90d9;
    outline: none;
    padding: 6px 10px;
    font-size: 16px;
    border-radius: 4px;
  }

  .list li .del-btn {
    border: none;
    background: none;
    color: #ccc;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .list li .del-btn:hover { color: #e06060; }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: #ccc;
    font-size: 16px;
  }

  .footer {
    text-align: center;
    margin-top: 32px;
    color: #ccc;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="app">
  <h1>todos</h1>

  <div class="input-row">
    <input id="newTodo" type="text" placeholder="What needs to be done?" autofocus>
    <button id="addBtn">添加</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <span class="count" id="count">0 项剩余</span>
      <div class="filters">
        <button class="active" data-filter="all">全部</button>
        <button data-filter="active">未完成</button>
        <button data-filter="completed">已完成</button>
      </div>
      <button class="clear-btn" id="clearBtn">清除已完成</button>
    </div>
    <ul class="list" id="list"></ul>
  </div>

  <div class="footer">双击任务可编辑 &middot; 数据自动保存</div>
</div>

<script>
const STORAGE_KEY = 'todos';

let todos = [];
let filter = 'all';

const $newTodo = document.getElementById('newTodo');
const $addBtn = document.getElementById('addBtn');
const $list = document.getElementById('list');
const $count = document.getElementById('count');
const $clearBtn = document.getElementById('clearBtn');
const $filters = document.querySelector('.filters');

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    todos = raw ? JSON.parse(raw) : [];
  } catch { todos = []; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
}

function render() {
  const filtered = filter === 'all'
    ? todos
    : filter === 'active'
      ? todos.filter(t => !t.completed)
      : todos.filter(t => t.completed);

  const activeCount = todos.filter(t => !t.completed).length;
  $count.textContent = activeCount + ' 项剩余';
  $clearBtn.style.display = todos.some(t => t.completed) ? '' : 'none';

  if (filtered.length === 0) {
    $list.innerHTML = '<div class="empty">暂无任务</div>';
    return;
  }

  $list.innerHTML = filtered.map((t, i) => {
    const realIdx = todos.indexOf(t);
    return `
      <li class="${t.completed ? 'completed' : ''}" data-id="${t.id}">
        <input type="checkbox" ${t.completed ? 'checked' : ''} data-action="toggle" data-idx="${realIdx}">
        <span class="text" data-action="edit" data-idx="${realIdx}">${escapeHtml(t.text)}</span>
        <button class="del-btn" data-action="delete" data-idx="${realIdx}">&times;</button>
      </li>`;
  }).join('');
}

function escapeHtml(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function add(text) {
  text = text.trim();
  if (!text) return;
  todos.unshift({ id: Date.now(), text, completed: false });
  save();
  render();
  $newTodo.value = '';
}

function toggle(idx) {
  todos[idx].completed = !todos[idx].completed;
  save();
  render();
}

function deleteTodo(idx) {
  todos.splice(idx, 1);
  save();
  render();
}

function clearCompleted() {
  todos = todos.filter(t => !t.completed);
  save();
  render();
}

function startEdit(li, idx) {
  const textEl = li.querySelector('.text');
  const oldText = todos[idx].text;
  const input = document.createElement('input');
  input.className = 'edit-input';
  input.value = oldText;
  textEl.replaceWith(input);
  input.focus();
  input.select();

  function finish() {
    const newText = input.value.trim();
    if (newText && newText !== oldText) {
      todos[idx].text = newText;
      save();
    }
    render();
  }

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') render();
  });
}

// Event delegation
$list.addEventListener('click', e => {
  const action = e.target.dataset.action;
  const idx = parseInt(e.target.dataset.idx);
  if (isNaN(idx)) return;

  if (action === 'toggle') toggle(idx);
  if (action === 'delete') deleteTodo(idx);
});

$list.addEventListener('dblclick', e => {
  const li = e.target.closest('li');
  if (!li) return;
  const textEl = e.target.closest('.text');
  if (!textEl) return;
  const idx = parseInt(textEl.dataset.idx);
  if (isNaN(idx)) return;
  startEdit(li, idx);
});

$addBtn.addEventListener('click', () => add($newTodo.value));
$newTodo.addEventListener('keydown', e => {
  if (e.key === 'Enter') add($newTodo.value);
});

$clearBtn.addEventListener('click', clearCompleted);

$filters.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  filter = e.target.dataset.filter;
  $filters.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

// Init
load();
render();
</script>

</body>
</html>
